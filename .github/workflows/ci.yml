name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Audit securite
        run: npm audit --audit-level=high
